<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>
<style>
body{ font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 40px; }
.todo{ width: 300px; }
.todo input{ width: 70%; padding: 8px; }
.todo button{ padding: 8px 12px; }
.todo ul{ list-style: none; padding: 0; margin-top: 14px; }
.todo li{ display: flex; justify-content: space-between; background: #f3f4f6; padding: 8px; margin-bottom: 6px; border-radius: 6px; }
.todo li button{ background: #ef4444; color: white; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
<div class="todo">
<h1>To-Do List</h1>
<input type="text" id="taskInput" placeholder="Add a new task">
<button onclick="addTask()">Add</button>
<ul id="taskList"></ul>
</div>
<script>
function addTask(){
const input = document.getElementById('taskInput');
const value = input.value.trim();
if(!value) return;

const li = document.createElement('li');
const span = document.createElement('span');
span.textContent = value;

const removeBtn = document.createElement('button');
removeBtn.textContent = 'X';
removeBtn.onclick = () => li.remove();

li.appendChild(span);
li.appendChild(removeBtn);
document.getElementById('taskList').appendChild(li);

input.value = '';
}
</script>
</body>
</html>
