<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce Navbar</title>
<style>
*{ margin: 0; padding: 0; box-sizing: border-box; }
body{ font-family: Arial, sans-serif; }
.navbar{ display: flex; justify-content: space-between; align-items: center; background-color: #111827; padding: 14px 24px; }
.logo{ color: white; font-size: 1.3rem; font-weight: bold; }
.nav-links{ display: flex; list-style: none; gap: 20px; }
.nav-links a{ color: white; text-decoration: none; font-weight: 500; }
.nav-links a:hover{ color: #93c5fd; }
@media (max-width: 600px){
.navbar{ flex-direction: column; gap: 12px; }
.nav-links{ flex-direction: column; text-align: center; gap: 10px; }
}
</style>
</head>
<body>
<nav class="navbar">
<div class="logo">ShopEasy</div>
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">Shop</a></li>
<li><a href="#">Cart</a></li>
<li><a href="#">Account</a></li>
</ul>
</nav>
<p style="text-align:center; margin-top: 40px;">Resize the browser window to see the navbar adapt.</p>
</body>
</html>
