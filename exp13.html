<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Image Gallery</title>
<style>
body{ font-family: Arial, sans-serif; padding: 30px; text-align: center; }
.gallery{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; max-width: 700px; margin: 20px auto; }
.gallery img{ width: 100%; height: 150px; object-fit: cover; border-radius: 8px; cursor: pointer; transition: transform 0.2s ease; }
.gallery img:hover{ transform: scale(1.05); }
@media (max-width: 600px){
.gallery{ grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<h1>Photo Gallery</h1>
<div class="gallery">
<img src="https://via.placeholder.com/200" alt="Gallery image 1">
<img src="https://via.placeholder.com/200" alt="Gallery image 2">
<img src="https://via.placeholder.com/200" alt="Gallery image 3">
<img src="https://via.placeholder.com/200" alt="Gallery image 4">
<img src="https://via.placeholder.com/200" alt="Gallery image 5">
<img src="https://via.placeholder.com/200" alt="Gallery image 6">
</div>
</body>
</html>
