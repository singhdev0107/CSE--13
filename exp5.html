<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Registration Form</title>
<style>
body{ font-family: Arial, sans-serif; margin: 30px; }
form{ max-width: 400px; }
label{ display: block; margin-top: 12px; font-weight: bold; }
input, button{ width: 100%; padding: 8px; margin-top: 4px; }

@media (max-width: 480px){
body{ margin: 16px; }
form{ max-width: 100%; }
}
</style>
</head>
<body>
<h1>Student Registration Form</h1>
<form action="#" method="post">
<label for="fullname">Full Name</label>
<input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

<label for="email">Email Address</label>
<input type="email" id="email" name="email" placeholder="example@college.edu" required>

<label for="rollno">Roll Number</label>
<input type="text" id="rollno" name="rollno" placeholder="e.g. CSE-13-01" required>

<label for="password">Password</label>
<input type="password" id="password" name="password" placeholder="Minimum 6 characters" minlength="6" required>

<button type="submit">Register</button>
</form>
</body>
</html>
