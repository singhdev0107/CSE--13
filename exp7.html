<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Navigation Menu</title>
<style>
*{ margin: 0; padding: 0; box-sizing: border-box; }
body{ font-family: Arial, sans-serif; }
.navbar{ background-color: #1f2937; padding: 12px 20px; overflow: hidden; }
.logo{ display: inline-block; color: white; font-size: 1.2rem; font-weight: bold; float: left; line-height: 32px; }
.nav-links{ float: right; }
.nav-links li{ display: inline-block; float: left; margin-left: 16px; }
.nav-links a{ color: white; text-decoration: none; font-weight: 500; }
.nav-links a:hover{ text-decoration: underline; }
</style>
</head>
<body>
<nav class="navbar">
<span class="logo">MySite</span>
<ul class="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>
</body>
</html>
