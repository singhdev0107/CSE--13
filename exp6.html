<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>E-commerce Product Page</title>
<style>
body{
font-family: Arial, sans-serif;
background-color: #f3f4f6;
display: flex;
justify-content: center;
padding: 40px;
}
.product-card{
background-color: #ffffff;
width: 320px;
padding: 20px;
border: 1px solid #d1d5db;
border-radius: 8px;
text-align: center;
}
.product-card img{
width: 100%;
height: auto;
border-radius: 6px;
margin-bottom: 12px;
}
.product-card h1{
font-size: 1.3rem;
color: #111827;
margin-bottom: 8px;
}
.product-card .price{
font-size: 1.5rem;
font-weight: bold;
color: #15803d;
margin-bottom: 12px;
}
.product-card .description{
font-size: 0.95rem;
color: #4b5563;
margin-bottom: 16px;
line-height: 1.4;
}
.product-card button{
width: 100%;
padding: 10px;
border: none;
border-radius: 6px;
background-color: #2563eb;
color: white;
font-weight: bold;
cursor: pointer;
}
.product-card button:hover{
background-color: #1d4ed8;
}
@media (max-width: 400px){
.product-card{ width: 100%; }
}
</style>
</head>
<body>
<div class="product-card">
<img src="https://via.placeholder.com/300x200" alt="Wireless Headphones">
<h1>Wireless Headphones</h1>
<p class="price">₹3,999</p>
<p class="description">Comfortable over-ear wireless headphones with noise cancellation and 20-hour battery life.</p>
<button>Add to Cart</button>
</div>
</body>
</html>
