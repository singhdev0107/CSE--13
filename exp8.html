<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Profile Cards</title>
<style>
body{ font-family: Arial, sans-serif; text-align: center; background-color: #f9fafb; padding: 30px; }
/* flex-wrap lets cards drop to the next line on small screens */
.card-container{ display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 20px; flex-wrap: wrap; }
.profile-card{ background-color: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px; width: 200px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
.profile-card img{ border-radius: 50%; margin-bottom: 10px; }
.profile-card h2{ font-size: 1.1rem; color: #1e293b; margin-bottom: 8px; }
.profile-card p{ font-size: 0.9rem; color: #6b7280; }
</style>
</head>
<body>
<h1>Student Profiles</h1>
<div class="card-container">
<div class="profile-card">
<img src="https://via.placeholder.com/100" alt="Student photo">
<h2>Aarav Sharma</h2>
<p>Roll No: CSE-13-01</p>
</div>
<div class="profile-card">
<img src="https://via.placeholder.com/100" alt="Student photo">
<h2>Priya Verma</h2>
<p>Roll No: CSE-13-02</p>
</div>
<div class="profile-card">
<img src="https://via.placeholder.com/100" alt="Student photo">
<h2>Rohan Gupta</h2>
<p>Roll No: CSE-13-03</p>
</div>
</div>
</body>
</html>
